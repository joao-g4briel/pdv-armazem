<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Novo Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h1>Novo Produto</h1>

    <form th:action="@{/produtos}"
          th:object="${produto}"
          method="post">

        <input
                class="form-control mb-2"
                th:field="*{codigo}"
                placeholder="Código">

        <input
                class="form-control mb-2"
                th:field="*{nome}"
                placeholder="Nome">

        <input
                class="form-control mb-2"
                th:field="*{categoria}"
                placeholder="Categoria">

        <input
                class="form-control mb-2"
                th:field="*{unidade}"
                placeholder="Unidade">

        <input
                class="form-control mb-2"
                th:field="*{precoCompra}"
                placeholder="Preço Compra">

        <input
                class="form-control mb-2"
                th:field="*{precoVenda}"
                placeholder="Preço Venda">

        <input
                class="form-control mb-2"
                th:field="*{estoqueAtual}"
                placeholder="Estoque">

        <input
                class="form-control mb-2"
                th:field="*{estoqueMinimo}"
                placeholder="Estoque Mínimo">

        <button
                class="btn btn-primary">

            Salvar

        </button>

    </form>

</div>

</body>

</html>
