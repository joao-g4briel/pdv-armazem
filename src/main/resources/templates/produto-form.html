<div th:replace="~{layouts/base :: body}">
    <div th:fragment="content">

        <div class="card">
            <div class="card-header bg-warning">
                <h3 class="card-title" th:text="${produto.id} == null ? 'Novo Produto' : 'Editar Produto'"></h3>
            </div>
            <div class="card-body">
                <form th:action="@{/produtos}" th:object="${produto}" method="post">

                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Código</label>
                                <input type="text" class="form-control" th:field="*{codigo}" required>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <div class="form-group">
                                <label>Nome</label>
                                <input type="text" class="form-control" th:field="*{nome}" required>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Categoria</label>
                                <input type="text" class="form-control" th:field="*{categoria}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Unidade</label>
                                <input type="text" class="form-control" th:field="*{unidade}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Estoque Atual</label>
                                <input type="number" class="form-control" th:field="*{estoqueAtual}" min="0">
                            </div>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Preço de Compra (R$)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precoCompra}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Preço de Venda (R$)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{precoVenda}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Estoque Mínimo</label>
                                <input type="number" class="form-control" th:field="*{estoqueMinimo}" min="0">
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Salvar
                        </button>
                        <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>
