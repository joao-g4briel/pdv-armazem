<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Comercial Reginha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            background:#F5F7FA;
            overflow-x:hidden;
        }

        .sidebar{

            width:260px;
            height:100vh;
            position:fixed;
            background:#0B1E36;
            color:white;
        }

        .menu-item{

            display:block;
            padding:15px 25px;
            color:white;
            text-decoration:none;
        }

        .menu-item:hover{

            background:#F57C00;
            color:white;
        }

        .main-content{

            margin-left:260px;
        }

        .page{

            padding:25px;
        }

        .card{

            border:none;
            border-radius:15px;
            box-shadow:0 2px 12px rgba(0,0,0,.08);
        }

        .card-value{

            color:#F57C00;
            font-size:30px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main-content">

    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="page">

        <!-- CONTEÚDO -->

    </div>

</div>

</body>

</html>
