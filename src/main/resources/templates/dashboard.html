<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Comercial Reginha</title>
</head>

<body>

<div th:replace="~{layouts/base :: body}">

    <div th:fragment="content">

        <!-- Info Boxes -->
        <div class="row">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 th:text="${totalProdutos} ?: '0'"></h3>
                        <p>Produtos Cadastrados</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-boxes"></i>
                    </div>
                    <a th:href="@{/produtos}" class="small-box-footer">
                        Ver todos <i class="fas fa-arrow-circle-right"></i>
                    </a>
                </div>
            </div>

            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3>R$ <span th:text="${#numbers.formatDecimal(totalValorEstoque, 1, 'POINT', 2, 'COMMA')} ?: '0,00'"></span></h3>
                        <p>Valor Total em Estoque</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <a href="#" class="small-box-footer">Mais informações <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>

            <div class="col-lg-3 col-6">
                <div class="small-box bg-warning">
                    <div class="inner">
                        <h3 th:text="${produtosBaixoEstoque} ?: '0'"></h3>
                        <p>Produtos em Baixo Estoque</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <a th:href="@{/produtos}" class="small-box-footer">
                        Ver produtos <i class="fas fa-arrow-circle-right"></i>
                    </a>
                </div>
            </div>

            <div class="col-lg-3 col-6">
                <div class="small-box bg-danger">
                    <div class="inner">
                        <h3 th:text="${vendasHoje} ?: '0'"></h3>
                        <p>Vendas Hoje</p>
                    </div>
                    <div class="icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <a href="#" class="small-box-footer">Ver PDV <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>
        </div>

        <!-- Restante do conteúdo (gráfico, alertas, etc.) -->
        <div class="row mt-4">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Vendas dos Últimos 7 Dias</h3>
                    </div>
                    <div class="card-body">
                        <canvas id="salesChart" height="120"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h3 class="card-title">Produtos em Alerta</h3>
                    </div>
                    <div class="card-body p-0">
                        <ul class="products-list product-list-in-card">
                            <li class="item" th:each="p : ${produtosCriticos}">
                                <div class="product-info">
                                    <span class="product-title" th:text="${p.nome}"></span>
                                    <span class="product-description">
                                        Estoque: <strong th:text="${p.estoqueAtual}"></strong> |
                                        Mín: <strong th:text="${p.estoqueMinimo}"></strong>
                                    </span>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    $(function () {
        new Chart(document.getElementById('salesChart'), {
            type: 'bar',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'],
                datasets: [{
                    label: 'Vendas (R$)',
                    data: [1250, 980, 2150, 1870, 3200, 1450, 890],
                    backgroundColor: '#28a745'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    });
</script>

</body>
</html>
