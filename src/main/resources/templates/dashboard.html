<div th:replace="~{layouts/base :: body}">
    <div th:fragment="content">

        <!-- Info Boxes -->
        <div class="row">
            <div class="col-lg-3 col-6">
                <div class="small-box bg-info">
                    <div class="inner">
                        <h3 th:text="${totalProdutos} ?: '0'"></h3>
                        <p>Produtos Cadastrados</p>
                    </div>
                    <div class="icon"><i class="fas fa-boxes"></i></div>
                    <a th:href="@{/produtos}" class="small-box-footer">Ver todos <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>

            <div class="col-lg-3 col-6">
                <div class="small-box bg-success">
                    <div class="inner">
                        <h3>R$ <span th:text="${#numbers.formatDecimal(totalValorEstoque, 1, 'POINT', 2, 'COMMA')} ?: '0,00'"></span></h3>
                        <p>Valor Total em Estoque</p>
                    </div>
                    <div class="icon"><i class="fas fa-dollar-sign"></i></div>
                    <a href="#" class="small-box-footer">Ver detalhes <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>

            <div class="col-lg-3 col-6">
                <div class="small-box bg-warning">
                    <div class="inner">
                        <h3 th:text="${produtosBaixoEstoque} ?: '0'"></h3>
                        <p>Produtos Baixo Estoque</p>
                    </div>
                    <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <a href="#" class="small-box-footer">Ver lista <i class="fas fa-arrow-circle-right"></i></a>
                </div>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Vendas da Semana</h3>
                    </div>
                    <div class="card-body">
                        <canvas id="salesChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    $(function () {
        new Chart(document.getElementById('salesChart'), {
            type: 'bar',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'],
                datasets: [{
                    label: 'Vendas (R$)',
                    data: [1250, 980, 2150, 1870, 3200, 1450, 890],
                    backgroundColor: '#28a745'
                }]
            },
            options: { responsive: true }
        });
    });
</script>
