<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Novo Produto - Comercial Reginha'"></title>
</head>

<body>

<div th:replace="~{layouts/base :: body}">

    <!-- Content Header já vem do base -->
    <div th:fragment="content">
        <div class="row">
            <div class="col-12">
                <div class="card card-warning card-outline">
                    <div class="card-header">
                        <h3 class="card-title">
                            <i class="fas fa-plus"></i> Cadastro de Novo Produto
                        </h3>
                    </div>

                    <div class="card-body">
                        <form th:action="@{/produtos}" th:object="${produto}" method="post">

                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Código</label>
                                        <input type="text" class="form-control" th:field="*{codigo}" placeholder="Ex: PROD001">
                                    </div>
                                </div>
                                <div class="col-md-8">
                                    <div class="form-group">
                                        <label>Nome do Produto</label>
                                        <input type="text" class="form-control" th:field="*{nome}" placeholder="Nome completo do produto">
                                    </div>
                                </div>
                            </div>

                            <div class="row mt-3">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Categoria</label>
                                        <input type="text" class="form-control" th:field="*{categoria}">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Unidade</label>
                                        <input type="text" class="form-control" th:field="*{unidade}" placeholder="Ex: un, kg, cx">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Estoque Atual</label>
                                        <input type="number" class="form-control" th:field="*{estoqueAtual}" min="0">
                                    </div>
                                </div>
                            </div>

                            <div class="row mt-3">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Preço de Compra (R$)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{precoCompra}">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Preço de Venda (R$)</label>
                                        <input type="number" step="0.01" class="form-control" th:field="*{precoVenda}">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label>Estoque Mínimo</label>
                                        <input type="number" class="form-control" th:field="*{estoqueMinimo}" min="0">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="fas fa-save"></i> Salvar Produto
                                </button>
                                <a th:href="@{/produtos}" class="btn btn-default btn-lg ml-2">
                                    <i class="fas fa-arrow-left"></i> Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
