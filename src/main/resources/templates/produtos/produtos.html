<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Produtos</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>

<body class="hold-transition sidebar-mini">

<div class="wrapper">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="content-wrapper">

        <section class="content-header">

            <div class="container-fluid">

                <div class="d-flex justify-content-between">

                    <h1>Produtos</h1>

                    <a href="/produtos/novo"
                       class="btn btn-success">

                        <i class="fas fa-plus"></i>

                        Novo Produto

                    </a>

                </div>

            </div>

        </section>

        <section class="content">

            <div class="container-fluid">

                <div class="card">

                    <div class="card-header">

                        <h3 class="card-title">
                            Lista de Produtos
                        </h3>

                    </div>

                    <div class="card-body">

                        <table class="table table-bordered table-striped">

                            <thead>

                            <tr>

                                <th>Código</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Estoque</th>
                                <th>Preço Venda</th>
                                <th>Ações</th>

                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="produto : ${produtos}">

                                <td th:text="${produto.codigo}"></td>

                                <td th:text="${produto.nome}"></td>

                                <td th:text="${produto.categoria}"></td>

                                <td th:text="${produto.estoqueAtual}"></td>

                                <td>

                                    R$

                                    <span th:text="${#numbers.formatDecimal(produto.precoVenda,1,'POINT',2,'COMMA')}">
                                    </span>

                                </td>

                                <td>

                                    <a th:href="@{/produtos/editar/{id}(id=${produto.id})}"
                                       class="btn btn-primary btn-sm">

                                        <i class="fas fa-edit"></i>

                                    </a>

                                    <a th:href="@{/produtos/excluir/{id}(id=${produto.id})}"
                                       class="btn btn-danger btn-sm">

                                        <i class="fas fa-trash"></i>

                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </section>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

</body>

</html>
