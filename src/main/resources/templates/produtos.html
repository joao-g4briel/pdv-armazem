<div th:replace="~{layouts/base :: body}">
    <div th:fragment="content">

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Lista de Produtos</h3>
                <div class="card-tools">
                    <a th:href="@{/produtos/novo}" class="btn btn-success btn-sm">
                        <i class="fas fa-plus"></i> Novo Produto
                    </a>
                </div>
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Unidade</th>
                        <th>Estoque Atual</th>
                        <th>Preço Venda</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.codigo}"></td>
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.categoria}"></td>
                        <td th:text="${produto.unidade}"></td>
                        <td th:text="${produto.estoqueAtual}"></td>
                        <td th:text="${#numbers.formatDecimal(produto.precoVenda, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td>
                            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-warning btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{/produtos/excluir/{id}(id=${produto.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Tem certeza que deseja excluir?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
