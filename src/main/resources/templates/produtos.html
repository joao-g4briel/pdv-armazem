<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Comercial Reginha</title>
</head>

<body>

<div th:replace="~{layouts/base :: body}">

    <div th:fragment="content">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h3 class="card-title">
                                <i class="fas fa-boxes"></i> Lista de Produtos
                            </h3>
                            <a th:href="@{/produtos/novo}" class="btn btn-success">
                                <i class="fas fa-plus"></i> Novo Produto
                            </a>
                        </div>
                    </div>

                    <div class="card-body">
                        <table class="table table-bordered table-striped table-hover" id="produtosTable">
                            <thead>
                            <tr>
                                <th>Código</th>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Unidade</th>
                                <th>Estoque Atual</th>
                                <th>Preço Venda</th>
                                <th>Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="produto : ${produtos}">
                                <td th:text="${produto.codigo}"></td>
                                <td th:text="${produto.nome}"></td>
                                <td th:text="${produto.categoria}"></td>
                                <td th:text="${produto.unidade}"></td>
                                <td th:text="${produto.estoqueAtual}"></td>
                                <td>
                                    R$ <span th:text="${#numbers.formatDecimal(produto.precoVenda, 1, 'POINT', 2, 'COMMA')}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-primary btn-sm">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/produtos/excluir/{id}(id=${produto.id})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Tem certeza que deseja excluir este produto?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
